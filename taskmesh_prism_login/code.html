<style>
        body {
            background-color: #131315;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass-card {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid #1E293B;
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
        }
        .prism-button {
            background: linear-gradient(135deg, #6f00be 0%, #06B6D4 100%);
            position: relative;
            overflow: hidden;
        }
        .prism-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 25%, rgba(255,255,255,0.1) 50%, transparent 75%);
            transform: rotate(30deg);
            transition: transform 0.5s;
        }
        .prism-button:hover::after {
            transform: rotate(30deg) translate(20%, 20%);
        }
        .shimmer-text {
            background: linear-gradient(90deg, #c0c6de, #acedff, #c0c6de);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex items-center justify-center p-gutter relative selection:bg-tertiary selection:text-on-tertiary">
<!-- Ambient Glow Effects -->
<div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-tertiary/5 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-[440px] z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="grid_view">grid_view</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface tracking-tighter">TaskMesh</h1>
</div>
<!-- Glass Login Card -->
<div class="glass-card rounded-xl p-xl relative overflow-hidden">
<!-- Header -->
<div class="mb-lg flex flex-col items-center">
<div class="px-3 py-1 rounded-full bg-tertiary/10 border border-tertiary/20 mb-md">
<span class="font-label-caps text-label-caps text-tertiary tracking-widest flex items-center gap-2 uppercase">
<span class="material-symbols-outlined text-[14px]" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                        Secure Sync
                    </span>
</div>
<h2 class="font-h3 text-h3 text-on-surface text-center">Initialize Session</h2>
</div>
<!-- Form -->
<form class="space-y-lg">
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-wider block ml-1">Email Terminal</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest/50 border-0 border-b border-outline-variant text-on-surface font-body-md py-4 px-1 focus:ring-0 focus:border-tertiary transition-all placeholder:text-outline-variant outline-none" placeholder="user@taskmesh.io" type="email"/>
<div class="absolute bottom-0 left-0 h-[1px] w-0 bg-tertiary transition-all duration-300 group-focus-within:w-full shadow-[0_0_8px_rgba(6,182,212,0.6)]"></div>
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-wider block">Access Key</label>
<a class="font-label-caps text-[10px] text-on-tertiary-container hover:text-tertiary transition-colors uppercase" href="#">Lost key?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest/50 border-0 border-b border-outline-variant text-on-surface font-body-md py-4 px-1 focus:ring-0 focus:border-tertiary transition-all placeholder:text-outline-variant outline-none" placeholder="••••••••••••" type="password"/>
<div class="absolute bottom-0 left-0 h-[1px] w-0 bg-tertiary transition-all duration-300 group-focus-within:w-full shadow-[0_0_8px_rgba(6,182,212,0.6)]"></div>
</div>
</div>
<button class="prism-button w-full h-14 rounded-lg flex items-center justify-center gap-sm group active:scale-[0.98] transition-transform" type="submit">
<span class="font-h3 text-[18px] text-white tracking-widest uppercase">Initialize Session</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</form>
<!-- SSO / Minimal Options -->
<div class="mt-xl">
<div class="relative flex items-center mb-lg">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink mx-4 font-label-caps text-[10px] text-outline-variant uppercase">Proxy Authenticate</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm h-12 bg-white/5 border border-white/10 rounded hover:bg-white/10 hover:border-white/20 transition-all active:scale-95">

<span class="font-label-caps text-on-surface uppercase text-[10px]">Google</span>
</button>
<button class="flex items-center justify-center gap-sm h-12 bg-white/5 border border-white/10 rounded hover:bg-white/10 hover:border-white/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px] text-outline" data-icon="terminal">terminal</span>
<span class="font-label-caps text-on-surface uppercase text-[10px]">SSH Key</span>
</button>
</div>
</div>
</div>
<!-- Footer Info -->
<p class="mt-xl text-center font-label-caps text-[11px] text-outline-variant tracking-widest uppercase">
            End-to-end encrypted node connection • v4.0.2-prism
        </p>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-margin left-margin w-8 h-8 border-t border-l border-white/10"></div>
<div class="fixed top-margin right-margin w-8 h-8 border-t border-r border-white/10"></div>
<div class="fixed bottom-margin left-margin w-8 h-8 border-b border-l border-white/10"></div>
<div class="fixed bottom-margin right-margin w-8 h-8 border-b border-r border-white/10"></div>
