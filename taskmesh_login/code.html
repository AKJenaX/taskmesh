<!DOCTYPE html>

<style>
        .glass-card {
            background: rgba(11, 19, 38, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 1px 1px 0px rgba(255, 255, 255, 0.05);
        }
        .bg-gradient-mesh {
            background: radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
                        #0b1326;
        }
        .glow-primary {
            box-shadow: 0 0 20px rgba(78, 222, 163, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gradient-mesh min-h-screen flex items-center justify-center p-gutter font-body-md text-on-background selection:bg-primary-container/30">
<!-- Login Container -->
<main class="w-full max-w-[440px] relative">
<!-- Branding Anchor (External to Card for visual hierarchy) -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-14 h-14 bg-primary-container rounded-2xl flex items-center justify-center glow-primary mb-stack-md">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" data-icon="grid_view">grid_view</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tighter">TaskMesh</h1>
</div>
<!-- Glassmorphic Login Card -->
<div class="glass-card rounded-[32px] p-10 relative overflow-hidden">
<!-- Secure Access Badge -->
<div class="flex justify-center mb-stack-md">
<div class="bg-secondary-container/30 border border-white/5 px-4 py-1.5 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[16px]" data-icon="verified_user">verified_user</span>
<span class="font-label-caps text-label-caps text-secondary-fixed-dim uppercase">Secure Access</span>
</div>
</div>
<div class="text-center mb-stack-lg">
<h2 class="font-title-sm text-title-sm text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Precision mastery over your schedule starts here.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-stack-md">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-high border-outline-variant/30 border text-on-surface font-body-md rounded-xl py-3.5 pl-12 pr-4 focus:outline-none focus:border-primary/50 focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline/50" id="email" placeholder="name@taskmesh.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock_open">lock_open</span>
</div>
<input class="w-full bg-surface-container-high border-outline-variant/30 border text-on-surface font-body-md rounded-xl py-3.5 pl-12 pr-12 focus:outline-none focus:border-primary/50 focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<div class="pt-stack-md">
<button class="w-full bg-primary-container text-on-primary-container font-title-sm py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-primary-fixed transition-all active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
<span>Continue to Dashboard</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Divider -->
<div class="relative my-stack-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/5"></div>
</div>
<div class="relative flex justify-center text-label-caps uppercase">
<span class="bg-surface-container px-3 text-outline/60">or enter via</span>
</div>
</div>
<!-- Social Auth -->
<div class="grid grid-cols-2 gap-stack-md">
<button class="flex items-center justify-center gap-3 bg-white/5 border border-white/5 hover:bg-white/10 transition-colors py-3 rounded-xl">
<img alt="" class="w-5 h-5 opacity-80" data-alt="Google logo icon on a clean white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYxELA-hYC_Msmi1FxYb2__YwP91nD9H54kHJuksZ6VE-IvrtTZmdsYnOQdjGnMA2Se7YG5FnD1l90r7-v2AFB2Mvvz06IJJZqZXzzeK8w0aJu38gP3BQHj5kRd6pnaEwtOO-FOPaz-D_1J9cQwZ5DaoKnH_NZ9VEK4mQJSjED3Dl0PCBhIOIp5_cDHcKnmureNtbUdmwmiCLA9ICko4qV3YQw7T5vm9ZaaeD0OVS9TIx74-U8DfsY0sQapNRTBRZo1FxbjqYyOK0"/>
<span class="font-body-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-white/5 border border-white/5 hover:bg-white/10 transition-colors py-3 rounded-xl">
<span class="material-symbols-outlined text-on-surface text-[20px]" data-icon="terminal">terminal</span>
<span class="font-body-sm text-on-surface">SSO</span>
</button>
</div>
<p class="text-center mt-stack-lg font-body-sm text-on-surface-variant">
                New to TaskMesh? <a class="text-primary font-semibold hover:underline" href="#">Request Invitation</a>
</p>
</div>
<!-- Aesthetic Backdrop Elements -->
<div class="absolute -z-10 -top-20 -left-20 w-64 h-64 bg-primary/20 rounded-full blur-[100px]"></div>
<div class="absolute -z-10 -bottom-20 -right-20 w-64 h-64 bg-tertiary-container/10 rounded-full blur-[100px]"></div>
</main>
<!-- Support Link -->
<footer class="fixed bottom-8 w-full flex justify-center">
<a class="flex items-center gap-2 text-outline hover:text-on-surface transition-all px-4 py-2 rounded-full hover:bg-white/5 group" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="help_outline">help_outline</span>
<span class="font-label-caps text-label-caps">Professional Support</span>
</a>
</footer>
</body></html>
