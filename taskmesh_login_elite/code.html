<style>
        body {
            background-color: #020617;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);

            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 70%);

            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);

<body class="font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center relative px-6">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 glow-overlay pointer-events-none"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<!-- Centerpiece Logo -->
<div class="mb-stack-lg z-10">
<div class="flex items-center gap-stack-xs group cursor-pointer transition-all duration-300">
<span class="material-symbols-outlined text-[40px] text-primary transition-all duration-500 group-hover:rotate-90" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-display-xl text-display-xl tracking-widest text-primary uppercase font-black">TASKMESH</span>
</div>
</div>
<!-- Secure Access Card -->
<main class="w-full max-w-[480px] z-10">
<div class="glass-panel rounded-xl p-stack-lg shadow-2xl relative overflow-hidden">
<!-- Subtle Scanning Line (Visual Detail) -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<header class="mb-stack-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-unit">Secure Access</h1>
<p class="text-on-surface-variant font-body-md opacity-70">Enterprise synchronization protocols active.</p>
</header>
<form class="space-y-stack-md" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-primary/80 uppercase ml-unit">Intelligence Identity</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-lowest border-outline-variant focus:border-primary focus:ring-0 rounded-lg py-4 pl-12 pr-4 text-on-surface font-mono-label placeholder:text-outline/40 transition-all duration-300" placeholder="name@corporation.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-unit">
<div class="flex justify-between items-center ml-unit">
<label class="font-label-caps text-label-caps text-primary/80 uppercase">Access Key</label>
<a class="font-mono-label text-primary/60 hover:text-primary transition-colors" href="#">Key Recovery</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<input class="w-full bg-surface-container-lowest border-outline-variant focus:border-primary focus:ring-0 rounded-lg py-4 pl-12 pr-4 text-on-surface font-mono-label placeholder:text-outline/40 transition-all duration-300" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary-fixed-dim text-on-primary-fixed font-headline-md text-headline-md py-4 rounded-lg flex items-center justify-center gap-2 transition-all duration-300 neon-glow btn-press group">
                    Continue to Dashboard
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="my-stack-md flex items-center gap-stack-md">
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
<span class="font-label-caps text-label-caps text-outline/50 uppercase">Federated Auth</span>
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-stack-md">
<button class="glass-panel hover:bg-white/5 py-3 rounded-lg flex items-center justify-center gap-3 transition-all duration-300 group btn-press border border-white/5">
<div class="w-5 h-5 flex items-center justify-center opacity-80 group-hover:opacity-100">
<svg class="w-full h-full fill-current" viewbox="0 0 24 24">

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</div>
<span class="font-mono-label text-on-surface">Google</span>
</button>
<button class="glass-panel hover:bg-white/5 py-3 rounded-lg flex items-center justify-center gap-3 transition-all duration-300 group btn-press border border-white/5">
<span class="material-symbols-outlined text-[20px] text-outline group-hover:text-primary transition-colors" data-icon="vpn_key">vpn_key</span>
<span class="font-mono-label text-on-surface">SSO</span>
</button>
</div>
</div>

<footer class="mt-stack-lg z-10 w-full max-w-[480px]">
<div class="flex flex-col md:flex-row items-center justify-between gap-stack-md px-2">

<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors uppercase" href="#">Professional Support</a>
</div>
<div class="text-outline/40 font-mono-label text-[10px] tracking-widest uppercase">
                v4.8.2.MESH
            </div>
</div>
</footer>
<!-- Visual Accent Element -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-container-max px-margin h-[2px]">
<div class="w-full h-full bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
